<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

</head>

<body>

<div class="container">

<img src="phoenix.jpg" class="logo">

<h1>Welcome to Phoenix</h1>

<p class="subtitle">Enter SMS Code</p>

<input class="code-box" id="code" type="text" placeholder="Enter Code">

<button class="green-btn" onclick="verifyOTP()">Next</button>

</div>

<button class="border-btn" onclick="goBack()">Back</button>

<script>

/* FIREBASE CONFIG */

const firebaseConfig = {
  apiKey: "AIzaSyB-f4usYcUBlCaeD_UBAkrSs6Y3xH2Kxl0",
  authDomain: "phoenix-6c3b7.firebaseapp.com",
  projectId: "phoenix-6c3b7",
  storageBucket: "phoenix-6c3b7.firebasestorage.app",
  messagingSenderId: "914099693715",
  appId: "1:914099693715:web:372c71c13c5c6f060c4566",
  measurementId: "G-5WLB8BML48"
};

firebase.initializeApp(firebaseConfig);


/* VERIFY OTP */

function verifyOTP(){

let code = document.getElementById("code").value;

if(code.length == 0){
alert("Please enter OTP");
return;
}

let confirmationResult = window.confirmationResult;

if(!confirmationResult){
alert("OTP session expired. Please request OTP again.");
window.location.href="phone.html";
return;
}

confirmationResult.confirm(code)

.then(function(result){

let user = result.user;

localStorage.setItem("userUID", user.uid);

alert("Login success");

window.location.href="create-profile.html";

})

.catch(function(error){

alert("Invalid OTP");

});

}


function goBack(){
window.location.href="phone.html";
}

</script>

</body>
</html>
