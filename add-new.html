<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="add-new.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="app">

<!-- TOP BAR -->

<div class="topbar">

<i class="fa-solid fa-arrow-left back" onclick="goBack()"></i>

<div class="title-box">
<h2>New chat</h2>
<p id="contactCount">0 contacts</p>
</div>

<div class="right-icons">
<i class="fa-solid fa-search" onclick="openSearch()"></i>
<i class="fa-solid fa-user-group" onclick="openGroup()"></i>
</div>

</div>


<!-- SEARCH BAR -->

<div class="search-box" id="searchBox">

<input type="text"
placeholder="Search contact"
onkeyup="searchContact(this.value)">

</div>


<!-- SECTION TITLE -->

<div class="section-title">
Contacts on Phoenix
</div>


<!-- CONTACT LIST -->

<div id="contactList">

<p class="empty">No contacts</p>

</div>

</div>


<script>

/* BACK */

function goBack(){
window.location.href="home.html";
}


/* NEW GROUP */

function openGroup(){
window.location.href="new-group.html";
}


/* SEARCH */

function openSearch(){

let box=document.getElementById("searchBox");

box.style.display =
box.style.display==="block" ? "none" : "block";

}


function searchContact(text){

let list=document.getElementById("contactList").children;

for(let i=0;i<list.length;i++){

let name=list[i].innerText.toLowerCase();

list[i].style.display =
name.includes(text.toLowerCase()) ? "flex" : "none";

}

}


/* LOAD CONTACTS */

let contacts = JSON.parse(localStorage.getItem("phoneContacts")) || [];

let list = document.getElementById("contactList");

let count = document.getElementById("contactCount");

count.innerText = contacts.length + " contacts";

if(contacts.length===0){

list.innerHTML="<p class='empty'>No contacts</p>";

}else{

list.innerHTML="";

contacts.forEach((c)=>{

let row=document.createElement("div");

row.className="contact-row";

row.onclick=function(){
openChat(c.name);
};

row.innerHTML=`

<img src="phoenix.jpg" class="dp">

<div class="info">
<b>${c.name}</b>
<p>${c.number}</p>
</div>

`;

list.appendChild(row);

});

}


/* OPEN MESSAGE */

function openChat(name){

localStorage.setItem("chatUser",name);

window.location.href="message.html";

}

</script>

</body>
</html>
