<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

</head>

<body>

<div class="container">

<img src="phoenix.jpg" class="logo">

<h1>Welcome to Phoenix</h1>

<p class="subtitle">Enter Phone Number</p>

<div class="phone-box">
<span>+91</span>
<input type="tel" id="phone" placeholder="XXXXXXXXXX">
</div>

<p id="error" class="error"></p>

<button class="green-btn" onclick="sendOTP()">Next</button>

</div>

<button class="border-btn" onclick="goBack()">Back</button>

<script>

/* FIREBASE CONFIG */

const firebaseConfig = {
  apiKey: "AIzaSyB-f4usYcUBlCaeD_UBAkrSs6Y3xH2Kxl0",
  authDomain: "phoenix-6c3b7.firebaseapp.com",
  projectId: "phoenix-6c3b7",
  storageBucket: "phoenix-6c3b7.firebasestorage.app",
  messagingSenderId: "914099693715",
  appId: "1:914099693715:web:372c71c13c5c6f060c4566",
  measurementId: "G-5WLB8BML48"
};

firebase.initializeApp(firebaseConfig);

/* AUTO INVISIBLE RECAPTCHA */

let recaptchaVerifier = new firebase.auth.RecaptchaVerifier(
'container',
{
  size: 'invisible'
}
);

recaptchaVerifier.render();

/* SEND OTP */

function sendOTP(){

let phone = document.getElementById("phone").value;
let error = document.getElementById("error");

if(phone.length !== 10){
error.innerText = "Enter valid phone number";
return;
}

let fullNumber = "+91" + phone;

firebase.auth().signInWithPhoneNumber(fullNumber, recaptchaVerifier)
.then(function(confirmationResult){

window.confirmationResult = confirmationResult;

localStorage.setItem("phoneNumber", fullNumber);

/* GO TO LOGIN PAGE */
window.location.href = "login.html";

})
.catch(function(err){
error.innerText = "OTP send failed";
console.log(err);
});

}

function goBack(){
window.location.href="index.html";
}

</script>

</body>
</html>
