<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phoenix</title>

<link rel="stylesheet" href="style.css">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.1/firebase-auth-compat.js"></script>

</head>

<body>

<div class="container">

<img src="phoenix.jpg" class="logo">

<h1>Welcome to Phoenix</h1>

<p>Enter Phone Number</p>

<div class="phone-box">
  <span>+91</span>
  <input type="tel" id="phone" placeholder="XXXXXXXXXX">
</div>

<div id="recaptcha-container"></div>

<p id="error" style="color:red;"></p>

<button class="green-btn" onclick="sendOTP()">Next</button>

</div>

<button class="border-btn" onclick="goBack()">Back</button>

<script>

/* FIREBASE CONFIG */

const firebaseConfig = {
  apiKey: "AIzaSyB-f4usYcUBlCaeD_UBAkrSs6Y3xH2Kxl0",
  authDomain: "phoenix-6c3b7.firebaseapp.com",
  projectId: "phoenix-6c3b7",
  storageBucket: "phoenix-6c3b7.appspot.com",
  messagingSenderId: "914099693715",
  appId: "1:914099693715:web:372c71c13c5c6f060c4566",
  measurementId: "G-5WLB8BML48"
};

firebase.initializeApp(firebaseConfig);


/* RECAPTCHA */

window.onload = function () {
  window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier(
    "recaptcha-container",
    {
      size: "invisible"
    }
  );

  window.recaptchaVerifier.render();
};


/* SEND OTP */

function sendOTP() {

  let phone = document.getElementById("phone").value;
  let error = document.getElementById("error");

  if (phone.length !== 10) {
    error.innerText = "Enter valid 10 digit number";
    return;
  }

  let fullNumber = "+91" + phone;

  firebase.auth().signInWithPhoneNumber(fullNumber, window.recaptchaVerifier)
    .then(function (confirmationResult) {

      window.confirmationResult = confirmationResult;

      localStorage.setItem("phoneNumber", fullNumber);
      localStorage.setItem("otpSession", "active");

      window.location.href = "login.html";

    })
    .catch(function (error) {
      console.log(error);
      document.getElementById("error").innerText = error.message;
    });

}


/* BACK */

function goBack() {
  window.location.href = "index.html";
}

</script>

</body>
</html>
