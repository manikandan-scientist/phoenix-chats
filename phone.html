firebase.initializeApp(firebaseConfig);


/* LOAD RECAPTCHA */

window.onload = function(){

window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier(
'recaptcha-container',
{
size:'invisible'
});

recaptchaVerifier.render();

}


/* SEND OTP */

function sendOTP(){

let phone = document.getElementById("phone").value;
let errorText = document.getElementById("error");

if(phone.length !== 10){
errorText.innerText = "Enter valid 10 digit number";
return;
}

let fullNumber = "+91" + phone;

firebase.auth().signInWithPhoneNumber(fullNumber, window.recaptchaVerifier)

.then(function(confirmationResult){

window.confirmationResult = confirmationResult;

localStorage.setItem("phoneNumber", fullNumber);
localStorage.setItem("otpSession", "active");

window.location.href = "login.html";

})

.catch(function(error){

console.log(error);
errorText.innerText = error.message;

});

}


function goBack(){

window.location.href="index.html";

}

</script>
