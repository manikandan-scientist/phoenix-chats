<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="language.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="app">

<div class="topbar">

<i class="fa-solid fa-arrow-left back" onclick="goBack()"></i>

<h2>App language</h2>

</div>


<div class="list">

<div class="lang" onclick="selectLang(this,'Tamil')">Tamil</div>
<div class="lang" onclick="selectLang(this,'English')">English</div>
<div class="lang" onclick="selectLang(this,'Malayalam')">Malayalam</div>
<div class="lang" onclick="selectLang(this,'Kannada')">Kannada</div>
<div class="lang" onclick="selectLang(this,'Telugu')">Telugu</div>
<div class="lang" onclick="selectLang(this,'Marathi')">Marathi</div>
<div class="lang" onclick="selectLang(this,'Urdu')">Urdu</div>
<div class="lang" onclick="selectLang(this,'French')">French</div>
<div class="lang" onclick="selectLang(this,'German')">German</div>
<div class="lang" onclick="selectLang(this,'Indonesia')">Indonesia</div>
<div class="lang" onclick="selectLang(this,'Korean')">Korean</div>
<div class="lang" onclick="selectLang(this,'Hindi')">Hindi</div>

</div>


<div class="buttons">

<button class="cancel" onclick="cancel()">Cancel</button>
<button class="ok" onclick="save()">OK</button>

</div>

</div>


<script src="language.js"></script>

</body>
</html>
