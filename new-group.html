<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="new-group.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="app">

<!-- TOP BAR -->

<div class="topbar">

<i class="fa-solid fa-arrow-left back" onclick="goBack()"></i>

<div class="title-box">
<h2>Create group</h2>
<p id="contactCount">0 contacts</p>
</div>

<i class="fa-solid fa-search search" onclick="toggleSearch()"></i>

</div>


<!-- SEARCH BAR -->

<div class="search-box" id="searchBox">

<input type="text"
placeholder="Search name or number"
onkeyup="searchContact(this.value)">

</div>


<!-- SECTION TITLE -->

<div class="section-title">
Contacts on Phoenix
</div>


<!-- CONTACT LIST -->

<div id="contactList">

<p class="empty">No contacts</p>

</div>

</div>


<!-- OK BUTTON BAR -->

<div class="ok-bar">

<button onclick="createGroup()">OK</button>

</div>



<script>

/* BACK */

function goBack(){
window.location.href="home.html";
}


/* SEARCH BAR */

function toggleSearch(){

let box=document.getElementById("searchBox");

box.style.display =
box.style.display==="block" ? "none" : "block";

}


/* SEARCH FUNCTION */

function searchContact(text){

let rows=document.getElementById("contactList").children;

for(let i=0;i<rows.length;i++){

let name=rows[i].innerText.toLowerCase();

rows[i].style.display =
name.includes(text.toLowerCase()) ? "flex" : "none";

}

}


/* LOAD CONTACTS */

let contacts =
JSON.parse(localStorage.getItem("phoneContacts")) || [];

let list=document.getElementById("contactList");

let count=document.getElementById("contactCount");

count.innerText = contacts.length + " contacts";

if(contacts.length===0){

list.innerHTML="<p class='empty'>No contacts</p>";

}else{

list.innerHTML="";

contacts.forEach((c)=>{

let row=document.createElement("div");

row.className="contact-row";

row.innerHTML=`

<input type="checkbox" value="${c.name}">

<img src="phoenix.jpg" class="dp">

<div class="info">
<b>${c.name}</b>
<p>${c.number}</p>
</div>

`;

list.appendChild(row);

});

}


/* CREATE GROUP */

function createGroup(){

let selected=[];

let checks=document.querySelectorAll("input[type=checkbox]:checked");

checks.forEach(c=>{
selected.push(c.value);
});

if(selected.length===0){
alert("Select at least one contact");
return;
}

localStorage.setItem("groupMembers",JSON.stringify(selected));

window.location.href="group-name.html";

}

</script>

</body>
