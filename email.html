<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="email.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="page">

<!-- Top bar -->

<div class="topbar">

<i class="fa-solid fa-arrow-left back" onclick="goBack()"></i>

<h2>Account</h2>

</div>


<!-- Content -->

<h3 class="title">Add your email to your Phoenix account</h3>

<p class="desc">
Email helps us verify your account or reach you in case of security or support issues. Your email address won't be visible to others
</p>


<!-- Email input -->

<p class="label">Email</p>

<input type="text" id="email" class="input" placeholder="Enter your email">


<!-- Save -->

<button class="save-btn" onclick="saveEmail()">Save</button>

</div>


<script>

/* Load saved email */
document.getElementById("email").value =
localStorage.getItem("email") || "";


/* Back */

function goBack(){
window.location.href="account.html";
}


/* Save email */

function saveEmail(){

let email = document.getElementById("email").value;

if(email.length === 0){
alert("Please enter email");
return;
}

localStorage.setItem("email", email);

alert("Email saved successfully ✅");

}

</script>

</body>
</html>
